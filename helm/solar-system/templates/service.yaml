apiVersion: v1
kind: Service
metadata:
  name: solar-system-service
  labels:
    app: {{ .Values.app }}
    tier: backend
    env: {{ .Values.env }}
spec:
  type: {{ .Values.service.type }}
  selector:
    app: {{ .Values.app }}
  ports:
    - port: {{ .Values.service.port }}
      targetPort: 3000
